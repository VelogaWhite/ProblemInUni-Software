<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ProbleminUni</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F7F6F3;
            --surface: #FFFFFF;
            --border: #E8E5DF;
            --text-primary: #1A1814;
            --text-secondary: #6B6760;
            --text-muted: #A8A49E;
            --accent: #2B5CE6;
            --accent-light: #EEF2FD;
            --danger: #E63B2B;
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-pill: 999px;
        }

        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* subtle dot pattern background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, #d0cdc7 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 100%; max-width: 440px;
            padding: 44px 40px;
            animation: fadeUp 0.4s ease both;
        }

        .brand {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.1rem; font-weight: 700; color: var(--accent);
            letter-spacing: -0.02em; text-decoration: none;
            margin-bottom: 28px;
        }
        .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

        .card-title { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 6px; }
        .card-subtitle { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 7px; }

        .form-control {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg);
            outline: none;
            transition: all 0.2s;
        }
        .form-control:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(43,92,230,0.08); }
        .form-control::placeholder { color: var(--text-muted); }

        .help-text { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
        .error-text { font-size: 0.75rem; color: var(--danger); margin-top: 5px; }

        .btn-submit {
            width: 100%; height: 46px; margin-top: 10px;
            border-radius: var(--radius-pill); border: none;
            background: var(--accent); color: white;
            font-size: 0.9rem; font-family: inherit; font-weight: 700;
            cursor: pointer; transition: all 0.15s;
            box-shadow: 0 2px 10px rgba(43,92,230,0.3);
        }
        .btn-submit:hover { background: #2250cc; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(43,92,230,0.4); }

        .card-footer {
            text-align: center;
            font-size: 0.84rem;
            color: var(--text-muted);
            margin-top: 22px;
        }
        .card-footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>

    <div class="card">
        <a href="{% url 'homepage' %}" class="brand">
            <span class="brand-dot"></span>
            ProbleminUni
        </a>

        <h2 class="card-title">สมัครสมาชิก</h2>
        <p class="card-subtitle">เข้าร่วมเป็นส่วนหนึ่งในการแจ้งปัญหา</p>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <p class="help-text">{{ field.help_text|safe }}</p>
                    {% endif %}
                    {% for error in field.errors %}
                        <p class="error-text">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-submit">ยืนยันการสมัคร</button>
        </form>

        <div class="card-footer">
            มีบัญชีอยู่แล้ว? <a href="{% url 'profile' %}">เข้าสู่ระบบเลย</a>
        </div>
    </div>

    <script>
        /* Apply consistent styling to all Django-generated inputs */
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.classList.add('form-control');
        });
    </script>

</body>
</html>
