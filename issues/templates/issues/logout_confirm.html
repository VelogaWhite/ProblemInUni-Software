<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยันการออกจากระบบ - Problem in Uni</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans text-gray-800">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">ยืนยันการออกจากระบบ</h2>
        <p class="text-gray-600 mb-8">คุณต้องการออกจากระบบใช่หรือไม่?</p>
        
        <div class="flex justify-center gap-4">
            <a href="{% url 'homepage' %}" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg transition">
                ยกเลิก
            </a>
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="px-6 py-2 bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-lg transition shadow-md">
                    ออกจากระบบ
                </button>
            </form>
        </div>
    </div>
</body>
</html>
